<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0 auto;
        }

        .container {
            width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .container-inner {
            margin-top: 48px;
            padding: 48px;
            position: absolute;
            background-color: #b7b4b4;
        }

        .sidebar {
            width: 20%;
            float: left;
            position: relative;
            display: inline;
        }

        .sidebar img {
            width: 100%;
            border-radius: 24px;
            display: block;
        }

        .content {
            width: 80%;
            float: left;
        }

        .content .info {
            padding-left: 50px;
        }

        .btn {
            background-color: black;
            color: #fff;
            margin: 10px;
            padding: 18px;
            position: absolute;
            border-radius: 10px;
            right: 0;
            top: 0;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="container-inner">
            <div class="sidebar">
                <img src="./images/1.jpg" alt="">
            </div>
            <div class="content">
                <div class="info">
                    <p>Батаа Мөнхбат</p>
                    <p>Батаа@email.com</p>
                    <p>Програм хөгжүүлэгч</p>
                </div>
                <div class="btn">NEW</div>
            </div>
        </div>
    </div>
</body>
</html>
