    <h3>Дасгал 2:</h3>
    <h4>Авах зүйлс</h4>
    <ol>
        <li>Кофе</li>
        <li>Цай</li>
        <li>Сүү</li>
        <li>Талх</li>
    </ol>

    <h3>Дасгал 3:</h3>
    <dt>
        <li><b>Шингэн зүйлс</b></li>
            <dd>
                <ol>
                    <li>Кофе</li>
                    <li>Цай</li>
                    <li><del>Сүү</del></li>
                </ol>
            </dd>

        <li><b>Хуурай зүйлс</b>
            <dd>
                <ol>
                    <li><mark>Өндөг</mark></li>
                    <li>Талх</li>
                    <li>Хиам</li>
                    <li>Aмттан:
                        <dd></dd>
                    </li>
                </ol
            </dd>
        </li>
    </dt>
