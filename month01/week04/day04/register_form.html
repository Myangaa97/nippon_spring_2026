<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>
<body>
    <h1>Get Started on Facebook</h1>

    <div>

    </div>


    <!--Inline element-->
<span>
    Hello
</span>
<span>World</span>

<br>
<div>
    <form action="https://google.com">
        <label for=firstname">
            First name
            <input type="text">
        </label>
        <br>
        <label for=lastname">
            Last name
            <input type="text">
        </label>

        <br>

        <label for="">Day</label>
        <select name="day">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>

        <br>
        <label for="month">Month</label>
        <select name="month">
            <option value="june">june</option>
            <option value="july">july</option>
            <option value="august">august</option>
            <option value="september">september</option>
        </select>

        <br>
        <label for="year">Year</label>
        <select name="year">
            <option value="2023">2023</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
        </select>

        <br>
        <label for="email">
            Email
            <input type="email" required>
        </label>

        <label for="password">
            Password
            <input type="password" required>
        </label>

        <br>

        <div>
            <textarea name="profile" id="" cols="50" rows="7"></textarea>
        </div>

        <br>
        <label for="">
            Click me
            <input type="checkbox" name="">
        </label>

        <input type="color">
        <input type="date">
        <input type="datetime-local">
        <input type="submit">
        <button type="submit">Click for Login</button>

        <br>

        <p>Please select fav website</p>
        <div>
            <!--name ni bvleglej bga bh ystoi-->
            <input type="radio" id="html" name="fav_web" value="html">
            <label for="HTML">HTML</label>
            <input type="radio" id="css" name="fav_web" value="css">
            <label for="css">CSS</label>
            <input type="radio" id="javascript" name="fav_web" value="javascript">
            <label for="css">Javascript</label>
        </div>

        <br>
        <input type="range" min="0" max="100">
    </form>
</div>

</body>
</html>
