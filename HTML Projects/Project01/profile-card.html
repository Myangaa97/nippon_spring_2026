<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main>
        <div id="card-profile">
            <div id="profile">
                <img src="./images/profile.png" class="profile_img" alt="">
            </div>
            <div id="profile-name">
                <span class="name">Johnny Rogers</span>
                <span class="name2">@jonnyrogers</span>
            </div>
            
            <div id="media-bottons">
                <a href="#" class="media">
                    <img src="./images/facebook-circular-logo.png" alt="facebook">
                </a>
                <a href="#" class="media">
                    <img src="./images/linkedin.png" alt="linkedin">
                </a>
                <a href="#" class="media">
                    <img src="./images/twitter.png" alt="twitter">
                </a>
                <a href="#" class="media">
                    <img src="./images/social-media.png" alt="instagram">
                </a>
                <a href="#" class="media">
                    <img src="./images/dribble.png" alt="dribble">
                </a>
            </div>

            <div id="about">
                <p>
                    Crafting brand and communication strategies, creating visual designs, leading art direction, and
                    capturing portraits through photography.
                </p>
            </div>

            <div id="buttons">
                <button class="follow">Follow</button>
                <button class="message">Message</button>
            </div>
            
        </div>
    </main>
</body>

</html>
