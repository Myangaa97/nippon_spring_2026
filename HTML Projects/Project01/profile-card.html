<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <main>
        <div id="card-profile">
            <div id="profile">
                <img src="./images/profile.png" alt="">
            </div>
            <h2 id="name">Johnny Rogers</h2>
            <p id="name2">@jonnyrogers</p>
            <ul>
                <li><img src="./images/facebook-circular-logo.png" alt="facebook"></li>
                <li><img src="./images/linkedin.png" alt="linkedin"></li>
                <li><img src="./images/twitter.png" alt="twitter"></li>
                <li><img src="./images/social-media.png" alt="instagram"></li>
                <li><img src="./images/dribble.png" alt="dribble"></li>
            </ul>
            <p id="about">Crafting brand and communication strategies, creating visual designs, leading art direction, and
                capturing portraits through photography.
            </p>

            <div id="frame">
                <p id="follow">Follow</p>
                <p id="message">Message</p>
            </div>
        </div>
    </main>
</body>

</html>
